name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Linux 打包 AppImage 需要额外工具
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libarchive-tools rpm

      # macOS：用 logo.png 生成 logo.icns（electron-builder 需要）
      - name: Generate logo.icns (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p build
          mkdir -p /tmp/logo.iconset
          sips -z 16 16   logo.png --out /tmp/logo.iconset/icon_16x16.png
          sips -z 32 32   logo.png --out /tmp/logo.iconset/icon_16x16@2x.png
          sips -z 32 32   logo.png --out /tmp/logo.iconset/icon_32x32.png
          sips -z 64 64   logo.png --out /tmp/logo.iconset/icon_32x32@2x.png
          sips -z 128 128 logo.png --out /tmp/logo.iconset/icon_128x128.png
          sips -z 256 256 logo.png --out /tmp/logo.iconset/icon_128x128@2x.png
          sips -z 256 256 logo.png --out /tmp/logo.iconset/icon_256x256.png
          sips -z 512 512 logo.png --out /tmp/logo.iconset/icon_256x256@2x.png
          sips -z 512 512 logo.png --out /tmp/logo.iconset/icon_512x512.png
          cp logo.png /tmp/logo.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/logo.iconset -o build/logo.icns

      # 为 Electron 重新编译 better-sqlite3（使用 electron-rebuild）
      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      # 预检查模型（模型已在 git 里，会跳过下载）
      - name: Pre-build (models check)
        run: npm run pre-build

      # Vite 打包前端
      - name: Build frontend
        run: npm run build

      # electron-builder 打包（--publish never 禁止它自己上传，由下面统一发布）
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      # 上传构建产物（手动触发时保存为 Artifacts，90天过期）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Flota-${{ matrix.platform }}-${{ github.ref_name }}
          path: dist-electron/
          if-no-files-found: warn

      # 推 tag 时自动发布到 GitHub Releases
      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.blockmap
            dist-electron/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
